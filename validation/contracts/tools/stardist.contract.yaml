id: stardist
version: "0.9.2"
model: 2D_versatile_fluo
trained_on:
  structures: [nuclei]        # decisive field: nucleus detector, not sub-nuclear
  modality: fluorescence_2d
output: instance_labels
io:
  ndim: 2
  needs_projection: true
  channels: single
weights:
  source: bundled_pretrained
  fetch_at_runtime: true
  offline_supported: true     # cached after first download
known_mismatches:
  - "sub-nuclear structures (nucleolus, condensates)"
